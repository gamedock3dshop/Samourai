<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porte-Encens Samouraï - حامل البخور ساموراي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .arabic-text { font-family: 'Cairo', sans-serif; direction: rtl; }
    </style>
</head>
<body class="text-gray-800 antialiased relative">

    <a href="https://wa.me/212664601352?text=Bonjour,%20je%20suis%20intéressé(e)%20par%20le%20Porte-Encens%20Samouraï." 
       target="_blank" 
       class="fixed bottom-6 right-6 bg-[#25D366] text-white p-4 rounded-full shadow-2xl z-50 hover:bg-green-600 transition-transform transform hover:scale-110 flex items-center justify-center animate-bounce">
        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="currentColor" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/></svg>
    </a>

    <header class="bg-black text-white text-center py-3 sticky top-0 z-40">
        <p class="text-sm font-bold text-yellow-400 animate-pulse">🔥 Offre Spéciale : 199 DH<br>Paiement à la livraison - الدفع عند الاستلام</p>
    </header>

    <main class="max-w-md mx-auto bg-white shadow-2xl min-h-screen pb-10">
        <div class="px-4 pt-6 pb-4 text-center">
            <h1 class="text-2xl font-extrabold text-gray-900 mb-2">Porte-Encens Samouraï 🧘‍♂️⚔️</h1>
            <h1 class="text-2xl font-extrabold text-gray-900 arabic-text">حامل البخور ساموراي 🧘‍♂️⚔️</h1>
        </div>

        <div class="w-full bg-black">
            <video class="w-full h-auto" controls autoplay muted loop playsinline>
                <source src="video.mp4" type="video/mp4">
            </video>
        </div>

        <div id="commande" class="px-6 py-8 bg-gray-900 text-white rounded-t-3xl mt-4">
            <h2 class="text-2xl font-bold text-center mb-2 text-yellow-400">Finaliser la Commande</h2>
            
            <form id="orderForm" class="space-y-4">
                <div>
                    <label class="block font-semibold mb-2" for="nom">Nom & Prénom *</label>
                    <input class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-white" type="text" id="nom" name="nom" required>
                </div>
                <div>
                    <label class="block font-semibold mb-2" for="telephone">Numéro de Téléphone *</label>
                    <input class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-white" type="tel" id="telephone" name="telephone" required>
                </div>
                <div>
                    <label class="block font-semibold mb-2" for="adresse">Adresse de Livraison *</label>
                    <textarea class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-700 text-white" id="adresse" name="adresse" rows="3" required></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold text-xl py-4 rounded-lg shadow-lg transition transform">
                    CONFIRMER - تأكيد الطلب
                </button>
            </form>
            
            <div id="successMessage" class="hidden mt-4 p-4 bg-green-700 text-white text-center rounded-lg font-bold">
                Commande reçue avec succès ! Merci. 🚚
            </div>
        </div>
    </main>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyaIAUukbsTOJh8lPHs0NrfA69qYzUaOClCK1I-6mprQ9HpxCu2KV-5w4VxxUNGTrryqg/exec';
        const form = document.getElementById('orderForm');
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('successMessage');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "Envoi en cours...";
            
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    form.reset();
                    msg.classList.remove('hidden');
                    btn.innerText = "CONFIRMER - تأكيد الطلب";
                    btn.disabled = false;
                })
                .catch(error => console.error('Error!', error.message));
        });
    </script>
</body>
</html>
